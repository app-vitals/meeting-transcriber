name: Release DMG

# Triggered by pushing a version tag, e.g.: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build, Sign, Notarize, Release
    runs-on: macos-14  # Apple Silicon runner (M1) — required for arm64 Swift builds

    permissions:
      contents: write  # needed to create GitHub Releases and upload assets

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Parse version from tag (strips leading 'v')
      # -----------------------------------------------------------------------
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Set up Bun
      # -----------------------------------------------------------------------
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # -----------------------------------------------------------------------
      # 4. Install runtime build tools
      # -----------------------------------------------------------------------
      - name: Install build tools
        run: |
          brew install create-dmg

      # -----------------------------------------------------------------------
      # 5. Import Developer ID certificate into an ephemeral keychain
      #
      #    Secrets to configure in GitHub → Settings → Secrets → Actions:
      #      APPLE_DEVELOPER_CERT         — base64-encoded .p12 file
      #                                     openssl base64 -in cert.p12 | pbcopy
      #      APPLE_DEVELOPER_CERT_PASSWORD — p12 export password
      # -----------------------------------------------------------------------
      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_DEVELOPER_CERT }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
        run: |
          # Create a temporary keychain so the cert doesn't persist after the job
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the p12
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CERT_B64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Make the keychain the default so codesign can find the cert
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      # -----------------------------------------------------------------------
      # 6. Resolve signing identity from the imported cert
      # -----------------------------------------------------------------------
      - name: Resolve signing identity
        id: signing
        run: |
          IDENTITY=$(security find-identity -v -p codesigning \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No 'Developer ID Application' certificate found in keychain."
            exit 1
          fi
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "Found signing identity: $IDENTITY"

      # -----------------------------------------------------------------------
      # 7. Build, sign, notarize, and package the DMG
      #
      #    Secrets to configure:
      #      NOTARY_TEAM_ID       — 10-character Apple Developer Team ID
      #      NOTARY_APPLE_ID      — Apple ID email (App Store Connect account)
      #      NOTARY_APP_PASSWORD  — App-specific password (appleid.apple.com)
      # -----------------------------------------------------------------------
      - name: Build and notarize DMG
        env:
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh --version "$VERSION"

      # -----------------------------------------------------------------------
      # 8. Create GitHub Release and upload DMG
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          DMG_PATH="build/MeetingTranscriber-${VERSION}.dmg"

          gh release create "$TAG" \
            --title "Meeting Transcriber $TAG" \
            --notes "$(cat <<'NOTES'
## Meeting Transcriber $TAG

Auto-records and transcribes your meetings on macOS. Detects when a meeting app activates your microphone, records both your voice and other participants, then produces a labeled transcript with speaker attribution.

### Install

1. Download **MeetingTranscriber-$TAG.dmg** below
2. Open the DMG and drag **Meeting Transcriber** to your Applications folder
3. Launch it — the app lives in your menu bar
4. Follow the onboarding flow to grant Microphone and Screen Recording permissions

### Prerequisites

Install once via Homebrew:

```
brew install sox whisper-cpp
```

### What's new

See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

---
*Requires macOS 13 (Ventura) or later.*
NOTES
)" \
            "$DMG_PATH"

      # -----------------------------------------------------------------------
      # 9. Clean up keychain
      # -----------------------------------------------------------------------
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
